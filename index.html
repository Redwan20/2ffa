
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Two-step authentication form with email and 2FA code entry</h2>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;">
  <div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:2rem 2rem;width:100%;max-width:400px;">

    <div id="step-email">
      <div style="margin-bottom:1.75rem;">
        <div style="width:40px;height:40px;border-radius:50%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:center;margin-bottom:1rem;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-secondary)" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <h2 style="font-size:18px;font-weight:500;margin:0 0 4px;color:var(--color-text-primary);">Sign in</h2>
        <p style="font-size:14px;color:var(--color-text-secondary);margin:0;">Enter your email to continue</p>
      </div>

      <div style="margin-bottom:1rem;">
        <label style="display:block;font-size:13px;color:var(--color-text-secondary);margin-bottom:6px;">Email address</label>
        <input id="email-input" type="email" placeholder="you@example.com" style="width:100%;box-sizing:border-box;" />
      </div>

      <div id="email-error" style="display:none;font-size:13px;color:var(--color-text-danger);margin-bottom:0.75rem;padding:8px 12px;background:var(--color-background-danger);border-radius:var(--border-radius-md);"></div>

      <button id="email-btn" onclick="submitEmail()" style="width:100%;padding:9px;font-size:14px;cursor:pointer;">
        <span id="email-btn-text">Continue</span>
      </button>
    </div>

    <div id="step-2fa" style="display:none;">
      <div style="margin-bottom:1.75rem;">
        <button onclick="goBack()" style="background:none;border:none;padding:0;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--color-text-secondary);margin-bottom:1rem;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
        <div style="width:40px;height:40px;border-radius:50%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:center;margin-bottom:1rem;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-secondary)" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h2 style="font-size:18px;font-weight:500;margin:0 0 4px;color:var(--color-text-primary);">Two-factor authentication</h2>
        <p style="font-size:14px;color:var(--color-text-secondary);margin:0;">Enter the confirmation code sent to <span id="email-display" style="color:var(--color-text-primary);font-weight:500;"></span></p>
      </div>

      <div style="margin-bottom:1rem;">
        <label style="display:block;font-size:13px;color:var(--color-text-secondary);margin-bottom:6px;">Confirmation code</label>
        <input id="code-input" type="text" placeholder="Enter your code" style="width:100%;box-sizing:border-box;letter-spacing:2px;" maxlength="20" />
      </div>

      <div id="code-error" style="display:none;font-size:13px;color:var(--color-text-danger);margin-bottom:0.75rem;padding:8px 12px;background:var(--color-background-danger);border-radius:var(--border-radius-md);"></div>

      <button id="code-btn" onclick="submitCode()" style="width:100%;padding:9px;font-size:14px;cursor:pointer;">
        <span id="code-btn-text">Verify</span>
      </button>
    </div>

    <div id="step-success" style="display:none;text-align:center;padding:1rem 0;">
      <div style="width:48px;height:48px;border-radius:50%;background:var(--color-background-success);border:0.5px solid var(--color-border-success);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-success)" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 style="font-size:18px;font-weight:500;margin:0 0 6px;color:var(--color-text-primary);">Authenticated</h2>
      <p style="font-size:14px;color:var(--color-text-secondary);margin:0 0 1.25rem;">You've signed in successfully.</p>
      <div id="success-data" style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;text-align:left;font-size:12px;font-family:var(--font-mono);color:var(--color-text-secondary);word-break:break-all;"></div>
    </div>

  </div>
</div>

<script>
let loginData = { loginId: null, inviteCodes: [], email: '' };

function setLoading(btnId, textId, loading, label) {
  const btn = document.getElementById(btnId);
  const txt = document.getElementById(textId);
  btn.disabled = loading;
  txt.textContent = loading ? 'Please wait...' : label;
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

async function submitEmail() {
  const email = document.getElementById('email-input').value.trim();
  if (!email) { showError('email-error', 'Please enter your email address.'); return; }
  showError('email-error', '');
  setLoading('email-btn', 'email-btn-text', true, 'Continue');

  try {
    const res = await fetch('https://28ac04qq.instances.httpworkbench.com/api/authentication/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ LoginEntry: email })
    });
    const data = await res.json();

    if (data.errorMessage) {
      showError('email-error', data.errorMessage);
      setLoading('email-btn', 'email-btn-text', false, 'Continue');
      return;
    }

    loginData.loginId = data.loginId;
    loginData.email = email;
    loginData.inviteCodes = data.inviteCodes || [];

    const emailCode = (data.inviteCodes || []).find(c => c.toLowerCase().includes('email')) || (data.inviteCodes || [])[0] || '';
    loginData.emailCode = emailCode;

    document.getElementById('email-display').textContent = email;
    document.getElementById('step-email').style.display = 'none';
    document.getElementById('step-2fa').style.display = 'block';
    document.getElementById('code-input').focus();

  } catch (e) {
    showError('email-error', 'Unable to reach the server. Please try again.');
  }
  setLoading('email-btn', 'email-btn-text', false, 'Continue');
}

async function submitCode() {
  const code = document.getElementById('code-input').value.trim();
  if (!code) { showError('code-error', 'Please enter the confirmation code.'); return; }
  showError('code-error', '');
  setLoading('code-btn', 'code-btn-text', true, 'Verify');

  try {
    const res = await fetch('https://28ac04qq.instances.httpworkbench.com/api/authentication/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        LoginId: loginData.loginId,
        InviteCode: loginData.emailCode,
        ConfirmationCode: code
      })
    });
    const data = await res.json();

    if (data.errorMessage) {
      showError('code-error', data.errorMessage);
      setLoading('code-btn', 'code-btn-text', false, 'Verify');
      return;
    }

    document.getElementById('step-2fa').style.display = 'none';
    document.getElementById('step-success').style.display = 'block';
    document.getElementById('success-data').textContent = JSON.stringify(data, null, 2);

  } catch (e) {
    showError('code-error', 'Unable to reach the server. Please try again.');
  }
  setLoading('code-btn', 'code-btn-text', false, 'Verify');
}

function goBack() {
  showError('code-error', '');
  document.getElementById('step-2fa').style.display = 'none';
  document.getElementById('step-email').style.display = 'block';
}

document.getElementById('email-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitEmail(); });
document.getElementById('code-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitCode(); });
</script>
